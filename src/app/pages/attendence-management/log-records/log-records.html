<div class="p-4 bg-white rounded-xl shadow-md">

  <div class="flex flex-wrap items-center justify-between rounded-sm gap-4 mb-4 px-3 py-4 bg-blue-200">
    <h2 class="text-xl font-semibold">Log Record List</h2>


    <div class="flex flex-wrap items-center gap-4 ml-auto">

      <!-- Search box -->

      <div
        class="flex items-center rounded-full overflow-hidden border border-gray-300 bg-white shadow-sm focus-within:border-blue-200 focus-within:ring-1 focus-within:ring-red-100 transition">
        <input
          matInput (input)="applyFilter($event)"
          class="px-4 py-2 border-0 outline-none focus:outline-none focus:ring-0 text-sm w-64"
          placeholder="Search..."
        />
        <button
          mat-icon-button
          class="h-full flex items-center justify-center px-3 hover:bg-gray-100">
          <mat-icon class="text-gray-500 text-base">search</mat-icon>
        </button>
      </div>

      <!-- Device select -->



     <div class=""></div>
    </div>
  </div>

   
  <div class="overflow-x-auto">
    <table
      mat-table
      [dataSource]="dataSource"
      class="min-w-full w-full mat-elevation-z1 mat-table-full-width"
    >

          <ng-container matColumnDef="id">
  <th mat-header-cell *matHeaderCellDef class="font-semibold">Sr No.</th>
  <td mat-cell *matCellDef="let element; let i = index">
    {{ (paginator.pageIndex * paginator.pageSize) + i + 1 }}
  </td>
</ng-container>

      <ng-container matColumnDef="empId">
        <th mat-header-cell *matHeaderCellDef class="font-semibold">
          Employee ID
        </th>
        <td mat-cell *matCellDef="let element">
          {{ element.employeeId}}
        </td>
      </ng-container>

      <ng-container matColumnDef="recordTime">
        <th mat-header-cell *matHeaderCellDef class="font-semibold">
         Records Time
        </th>
        <td mat-cell *matCellDef="let element">
       {{ element.recordTime | date:'dd-MM-yyyy HH:mm' }}

          <!-- .split("T")[0] -->
           <!-- | date:'yyyy-MM-dd' -->
        </td>
      </ng-container>

      <!-- Device Name -->
      <ng-container matColumnDef="ioStatus">
        <th mat-header-cell *matHeaderCellDef class="font-semibold">
          IoStatus
        </th>
        <td mat-cell *matCellDef="let element">
          {{ element.ioStatus }}
        </td>
      </ng-container>

      <!-- Device IP -->
      <ng-container matColumnDef="deviceName">
        <th mat-header-cell *matHeaderCellDef class="font-semibold">
        Device 
        </th>
        <td mat-cell *matCellDef="let element">
          {{ element.deviceSerial }}
        </td>
      </ng-container>

      <!-- Header & Row -->
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr
        mat-row
        *matRowDef="let row; columns: displayedColumns"
        class="hover:bg-gray-50"
      ></tr>
    </table>
  </div>

  <!-- Paginator -->
  <mat-paginator
    [length]="dataSource?.length || 0"
    [pageSize]="10"
    [pageSizeOptions]="[10, 20, 30, 40, 50]"
    showFirstLastButtons
    class="mt-4">
  </mat-paginator>
</div>

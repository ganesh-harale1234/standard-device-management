<!-- Header -->
<div class="flex items-center justify-between mb-3">
  <h1 class="text-xl font-semibold text-black">Role Master</h1>

  <div class="relative">
    <select
      class="appearance-none w-56 rounded-md border border-blue-300 bg-white px-4 py-2 text-sm text-gray-600 shadow-sm focus:outline-none"
      [(ngModel)]="selectedRole"
      (change)="onRoleChange()">

      <option value="">Select Role</option>
      <option *ngFor="let r of roles" [value]="r">
        {{ r }}
      </option>
    </select>
    <span class="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 text-gray-400">▼</span>
  </div>
</div>

<div class="rounded-xl border border-gray-200 bg-white p-6 shadow-sm">

  <!-- Table Header -->
  <div class="grid grid-cols-12 rounded-lg bg-gray-200 px-4 py-3 text-sm font-medium">
    <div class="col-span-2">Sr.No</div>
    <div class="col-span-7">Visibility Rights</div>
    <div class="col-span-3 text-right">Permissions</div>
  </div>

  <!-- MAIN MODULES -->
  <ng-container *ngFor="let module of modules; let i = index">

    <!-- SIMPLE MODULE (NO CHILD) -->
    <div *ngIf="!module.children"
         class="grid grid-cols-12 items-center border-b px-4 py-3 text-sm">

      <div class="col-span-2">{{ i + 1 }}.</div>
      <div class="col-span-7 font-medium">{{ module.name }}</div>
      <div class="col-span-3 text-right">
        <input
          type="checkbox"
          class="h-4 w-4 accent-blue-600"
          [(ngModel)]="module.allowed"
          (change)="updatePermissions()" />
      </div>
    </div>

    <!-- MODULE WITH CHILD (ACCORDION) -->
    <div *ngIf="module.children" class="border-b">

      <button
        class="grid w-full grid-cols-12 items-center px-4 py-3 text-sm text-left cursor-pointer"
        (click)="toggleAccordion(i)"
        [ngClass]="activeIndex === i ? 'bg-blue-100' : ''">

        <div class="col-span-2">{{ i + 1 }}.</div>

        <div class="col-span-7 flex items-center font-medium">
          {{ module.name }}
          <span class="ml-auto transition-transform"
                [ngClass]="activeIndex === i ? 'rotate-180' : ''">▼</span>
        </div>

        <div class="col-span-3"></div>
      </button>

      <!-- SUB MODULES -->
      <div *ngIf="activeIndex === i"
           class="bg-white px-12 py-3 space-y-2 text-sm">

        <div
          *ngFor="let child of module.children"
          class="flex justify-between items-center">

          <span>{{ child.name }}</span>
          <input
            type="checkbox"
            class="h-4 w-4 accent-blue-600"
            [(ngModel)]="child.allowed"
            (change)="updatePermissions()" />
        </div>

      </div>
    </div>

  </ng-container>

</div>

<div class="mt-6 text-right">
  <button
    (click)="saveRolePermissions()"
    class="rounded-md bg-blue-600 px-6 py-2 text-white text-sm font-medium hover:bg-blue-700">
    Save Permissions
  </button>
</div>

<div class="p-0 bg-[#cfe8ff]">
  <!-- TOP FILTER BAR -->
   <div
  class="flex flex-wrap items-center justify-center gap-5 px-3 py-3 bg-[#cfe8ff] border-b border-gray-400"
>


  <!-- From date -->
  <mat-form-field
    appearance="fill"
    class="w-44 !m-0  rounded-none custom-field"
  >
    <mat-label>From</mat-label>
    <input
      matInput
      [matDatepicker]="fromPicker"
      [(ngModel)]="fromDate"
    />
    <mat-datepicker-toggle matSuffix [for]="fromPicker"></mat-datepicker-toggle>
    <mat-datepicker #fromPicker></mat-datepicker>
  </mat-form-field>

  <!-- To date -->
  <mat-form-field
    appearance="fill"
    class="w-44 !m-0  rounded-none custom-field"
  >
    <mat-label>To</mat-label>
    <input
      matInput
      [matDatepicker]="toPicker"
      [(ngModel)]="toDate"
    />
    <mat-datepicker-toggle matSuffix [for]="toPicker"></mat-datepicker-toggle>
    <mat-datepicker #toPicker></mat-datepicker>
  </mat-form-field>

  <!-- Buttons (right aligned) -->
  <div class="flex items-center gap-2 ">
    <button style="cursor: pointer;"
     
      color="primary"
      class="bg-blue-600 text-white px-2 py-2 !text-sm mb-4"
      (click)="personTrackingReport()">
      View Report
    </button>

    <button
      color="primary"style="cursor: pointer;"
      class="bg-blue-700 text-white px-2 py-2 !text-sm flex items-center mb-4"
      (click)="onExportPdf()">
      <mat-icon class="!text-base">download</mat-icon>
      Export to pdf
    </button>
  </div>
</div>


    <div id="contentToConvert">

  <div class="border border-black border-t-0">
    <!-- Title row -->
    <div class="border-b border-black bg-[#cfe8ff] text-center py-2">
      <span class="font-semibold text-lg">Person Tracking Report</span>
    </div>

    <!-- Date / Time row -->
    <div class="border-b border-black bg-[#cfe8ff] text-center py-3 text-sm">
      <div>
        From Date:
        <span class="font-semibol ">
          {{ fromDate | date: 'MMM d, y' }}
          to
          {{ toDate | date: 'MMM d, y' }}
        </span>
      </div>
      <div>
        Report Time:
        <span class="font-semibol">
          {{ now | date: 'MMM d, y, h:mm:ss a' }}
        </span>
      </div>
    </div>

    <!-- TABLE HEADER ROW -->
    <div class="" style="background-color: white !important;">
      <table class="w-full border-collapse">
        <thead>
          <tr>
            <th class="border border-black px-2 py-3 text-ms">Sr No.</th> 
            <th class="border border-black px-2 py-3 text-ms">Enroll ID</th>
            <th class="border border-black px-2 py-3 text-ms">Date</th>
            <th class="border border-black px-2 py-3 text-ms w-194"> Punches </th>
          </tr>
        </thead>
   <tbody>
    

          <tr *ngFor="let row of reportData; index as i">
            <td class="border border-black px-2 py-1 text-sm text-center">
              {{ i + 1 }}
            </td>
            <td class="border border-black px-2 py-1 text-sm">
              {{ row.enrollId }}
            </td>
            <td class="border border-black px-2 py-1 text-sm">
              {{ row.date }}
            </td>
         
            <td class="border border-black px-2 py-1 text-sm w-194">
              {{ row.punches }}
            </td>

          </tr>

          <!-- <tr *ngIf="reportData.length === 0">
            <td
              colspan="6"
              class="border border-black px-2 py-4 text-center text-sm"
            >
              No records found
            </td>
          </tr> -->
        </tbody> 
      </table>
    </div>
  </div>
  </div>
</div>
